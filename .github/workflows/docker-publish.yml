name: Publicar imagens Docker

# Builda e publica as imagens no GitHub Container Registry (ghcr.io).
on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch: # permite rodar manualmente pela aba Actions

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # necessario para publicar no ghcr.io
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend # o jogo
            context: ./frontend
          - name: backend # API (esqueleto MVP 2)
            context: ./backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadados (tags e labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build e push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # VITE_API_URL so se aplica ao frontend (vazio = jogo offline).
          # Defina em Settings > Secrets and variables > Actions > Variables.
          build-args: ${{ matrix.name == 'frontend' && format('VITE_API_URL={0}', vars.VITE_API_URL) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
