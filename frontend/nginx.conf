server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressao para reduzir o bundle (Phaser e grande).
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # Assets com hash no nome: cache agressivo e imutavel.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html nunca em cache (sempre pega a versao mais nova).
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Fallback para a SPA.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
